apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.appName }}
  description: Helios Application - ${{ values.appName }}
  annotations:
    github.com/project-slug: ${{ values.githubOwner }}/${{ values.appName }}
    backstage.io/kubernetes-id: ${{ values.appName }}
spec:
  type: service
  lifecycle: experimental
  owner: user:guest
  system: helios-platform