apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: advanced-nodejs-template
  title: Advanced Node.js Template (GitOps + Webhooks)
  description: Scaffolds a Node.js Service with Source Code, GitOps manifests (ArgoCD + Tekton), and Webhook configuration.
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Component Information
      required:
        - name
        - owner
        - port
      properties:
        name:
          title: Name
          type: string
          description: Unique name of the component
          ui:autofocus: true
        owner:
          title: Owner
          type: string
          description: Owner of the component
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]
        port:
          title: Port
          type: number
          description: The port to expose
          default: 8080
        dockerOrg:
            title: Docker Registry Org/User
            type: string
            description: Your Docker Hub username or Organization
            default: myuser
        repoName:
            title: Docker Repository Name
            type: string
            description: The name of the repository (e.g. my-service)

    - title: Repository & Webhook
      required:
        - repoUrl
        - webhookUrl
        - webhookSecret
      properties:
        repoUrl:
          title: Source Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
        webhookUrl:
          title: Webhook URL
          type: string
          description: The URL to send the webhook payload to
        webhookSecret:
          title: Webhook Secret
          type: string
          description: The secret to use for the webhook
          ui:field: Secret

  steps:
    # 1. Source Code Logic
    - id: fetch-source
      name: Fetch Source Code
      action: fetch:template
      input:
        url: ./content/source
        targetPath: ./source
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.port }}
          description: "Service for ${{ parameters.name }}"
          image: index.docker.io/${{ parameters.dockerOrg }}/${{ parameters.repoName }}

    - id: publish-source
      name: Publish Source Code
      action: publish:github
      input:
        description: Source Code for ${{ parameters.name }}
        repoUrl: ${{ parameters.repoUrl }}
        sourcePath: ./source
        token: ${{ secrets.USER_OAUTH_TOKEN }}
        repoVisibility: public
        protectDefaultBranch: false

    - id: create-webhook
      name: Create Webhook
      action: github:webhook
      input:
        repoUrl: ${{ parameters.repoUrl }}
        webhookUrl: ${{ parameters.webhookUrl }}
        webhookSecret: ${{ parameters.webhookSecret }}
        events:
          - push
        active: true
        contentType: json
        token: ${{ secrets.USER_OAUTH_TOKEN }}

    # 2. GitOps Logic
    - id: fetch-gitops
      name: Fetch GitOps Manifests
      action: fetch:template
      input:
        url: ./content/gitops
        targetPath: ./gitops
        values:
          name: ${{ parameters.name }}
          image: index.docker.io/${{ parameters.dockerOrg }}/${{ parameters.repoName }}
          dockerOrg: ${{ parameters.dockerOrg }}
          repoName: ${{ parameters.repoName }}
          port: ${{ parameters.port }}
          sourceRepo: ${{ steps['publish-source'].output.remoteUrl }}
          gitopsRepo: ${{ steps['publish-source'].output.remoteUrl | replace(".git", "") }}-gitops
          webhookUrl: ${{ parameters.webhookUrl }}

    - id: publish-gitops
      name: Publish GitOps Manifests
      action: publish:github
      input:
        description: GitOps Manifests for ${{ parameters.name }}
        repoUrl: ${{ parameters.repoUrl }}-gitops
        sourcePath: ./gitops
        token: ${{ secrets.USER_OAUTH_TOKEN }}
        repoVisibility: public
        protectDefaultBranch: false

    - id: apply-helios
      name: Deploy to Kubernetes
      action: kubernetes:apply
      input:
        manifestPath: ./gitops/helios-app.yaml
        namespaced: true

    # 2.1 Secret Creation
    - id: fetch-secret
      name: Generate Secret Manifest
      action: fetch:template
      input:
        url: ./content/deploy
        targetPath: ./deploy
        values:
          name: ${{ parameters.name }}
          token: ${{ secrets.USER_OAUTH_TOKEN }}
          username: git # Standard placeholder for PAT auth
          webhookSecret: ${{ parameters.webhookSecret }}

    - id: apply-secret
      name: Apply Secret
      action: kubernetes:apply
      input:
        manifestPath: ./deploy/secret.yaml
        namespaced: true

    # 3. Registration
    - id: register
      name: Register Component
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-source'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

    - id: notify
      name: Notify User
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: 'Advanced Template Executed'
        info: 'Your advanced Node.js service has been scaffolded with GitOps and Webhooks!'

  output:
    links:
      - title: Source Repository
        url: ${{ steps['publish-source'].output.remoteUrl }}
      - title: GitOps Repository
        url: ${{ steps['publish-gitops'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
