apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name | dump }}
  annotations:
    backstage.io/kubernetes-id: ${{ values.name }}
    argocd/app-name: ${{ values.name }}-service
    janus-idp.io/tekton: ${{ values.name }}-service
spec:
  type: service
  owner: ${{ values.owner }}
  lifecycle: experimental
  providesApis:
    - ${{ values.name }}-api
