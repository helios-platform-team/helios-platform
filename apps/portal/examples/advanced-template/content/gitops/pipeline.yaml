apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: ${{ values.name }}-pipeline-run
  annotations:
    janus-idp.io/tekton: ${{ values.name }}-service
spec:
  serviceAccountName: pipeline
  pipelineRef:
    name: from-code-to-cluster
  params:
  - name: image-repo
    value: ${{ values.image }}
  - name: app-repo-url
    value: ${{ values.sourceRepo }}
  - name: app-repo-revision
    value: main
  - name: gitops-repo-url
    value: ${{ values.gitopsRepo }}
  - name: gitops-repo-branch
    value: main
  - name: manifest-path-in-gitops-repo
    value: ./deployment.yaml
  - name: docker-secret
    value: docker-credentials 
  - name: test-command
    value: ${{ values.testCommand }}
  # (Optional override – can be omitted to use the pipeline default)
  # - name: test-image
  #   value: node:20
  workspaces:
  - name: source-workspace
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
