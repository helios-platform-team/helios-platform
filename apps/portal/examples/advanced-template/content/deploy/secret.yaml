apiVersion: v1
kind: Secret
metadata:
  name: github-credentials-${{ values.name }}
  namespace: ${{ values.namespace | default("default") }}
type: Opaque
stringData:
  token: "${{ values.token }}"
  password: "${{ values.token }}"
  username: "${{ values.username }}"
  secretToken: "${{ values.webhookSecret }}"
