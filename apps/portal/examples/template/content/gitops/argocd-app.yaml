apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.name }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ${{ values.gitopsRepo }}
    targetRevision: main
    path: .
    directory:
      exclude: '{package.json,*.json,catalog-info.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
