apiVersion: app.helios.io/v1alpha1
kind: HeliosApp
metadata:
  name: sample-app
  namespace: default
spec:
  owner: dev-team
  description: "Sample web application"
  components:
    - name: api-server
      type: web-service
      properties:
        image: "myregistry/api:v1.0.0"
        port: 3000
        replicas: 2
        env:
          - name: NODE_ENV
            value: production
      traits:
        - type: service
          properties:
            port: 3000
        - type: ingress
          properties:
            host: "api.example.com"
            port: 3000
  gitopsRepo: "https://github.com/YOUR_USERNAME/YOUR_GITOPS_REPO"
  gitopsPath: "apps/dev/your-app"
  gitopsBranch: "main"
  gitopsSecretRef: "github-credentials" # Unified secret

  # Source Code & Docker Info
  gitRepo: "https://github.com/YOUR_USERNAME/YOUR_REPO"
  gitBranch: "main"
  imageRepo: "docker.io/YOUR_DOCKER_USER/YOUR_IMAGE_NAME"

  # Tekton & Ingress Config
  # Note: Hostname only, no https:// prefix
  webhookDomain: "YOUR-NGROK-DOMAIN.ngrok-free.dev"
  webhookSecret: "github-credentials" # Unified secret
  pipelineName: "from-code-to-cluster"
  serviceAccount: "default"
  
  # Resource & Port Config
  port: 8080
  replicas: 1
  resources:
    limits:
      cpu: "500m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "64Mi"

