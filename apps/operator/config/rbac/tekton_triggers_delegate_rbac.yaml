# config/rbac/tekton_triggers_delegate_rbac.yaml

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tekton-triggers-delegate-role
  namespace: helios-apps # Cấp quyền trong namespace của ứng dụng
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["services", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-triggers-delegate-binding
  namespace: helios-apps # Gắn quyền trong namespace của ứng dụng
subjects:
# Service Account của "tổng đài" Tekton
- kind: ServiceAccount
  name: tekton-triggers-controller
  namespace: tekton-pipelines # Namespace của "tổng đài"
roleRef:
  kind: Role
  name: tekton-triggers-delegate-role
  apiGroup: rbac.authorization.k8s.io