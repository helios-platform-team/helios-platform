---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: heliosapps.platform.helios.io
spec:
  group: platform.helios.io
  names:
    kind: HeliosApp
    listKind: HeliosAppList
    plural: heliosapps
    singular: heliosapp
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: HeliosApp is the Schema for the heliosapps API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HeliosAppSpec defines the desired state of HeliosApp
            properties:
              contextSubpath:
                description: 'Subdirectory trong source repo chứa Dockerfile (ví dụ:
                  "my-app", để trống nếu Dockerfile ở root)'
                type: string
              enableAutoOptimization:
                default: false
                description: Bật tính năng tự động tối ưu hóa tài nguyên (Smart Rightsizer)
                type: boolean
              env:
                description: Môi trường hoạt động của ứng dụng (Environment Variables)
                items:
                  properties:
                    name:
                      type: string
                    value:
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
              gitBranch:
                default: main
                type: string
              gitRepo:
                type: string
              gitopsPath:
                description: 'Đường dẫn đến thư mục của ứng dụng trong GitOps repo
                  (ví dụ: "apps/production/my-api")'
                type: string
              gitopsRepo:
                description: URL của GitOps repository trung tâm nơi lưu trữ manifest
                  đã render
                type: string
              imageRepo:
                type: string
              pipelineName:
                description: Tên của Tekton Pipeline sẽ được kích hoạt.
                type: string
              port:
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              pvcName:
                type: string
              replicas:
                default: 1
                format: int32
                minimum: 0
                type: integer
              resources:
                description: Cấu hình tài nguyên (CPU, Memory)
                properties:
                  limits:
                    additionalProperties:
                      type: string
                    type: object
                  requests:
                    additionalProperties:
                      type: string
                    type: object
                type: object
              serviceAccount:
                description: Tên của ServiceAccount mà PipelineRun sẽ sử dụng.
                type: string
              templatePath:
                description: 'Đường dẫn đến template trong templateRepo (ví dụ: "charts/my-app")'
                type: string
              templateRepo:
                description: URL của repository chứa Helm chart hoặc Kustomize template
                type: string
              values:
                additionalProperties:
                  type: string
                description: 'Các giá trị tùy chỉnh để render template (ví dụ: ingress.host,
                  resources, etc.)'
                type: object
                x-kubernetes-preserve-unknown-fields: true
              webhookSecret:
                description: Tên của Secret chứa mã webhook cho GitHub.
                type: string
            required:
            - gitRepo
            - gitopsPath
            - gitopsRepo
            - imageRepo
            - pipelineName
            - port
            - pvcName
            - serviceAccount
            - templatePath
            - templateRepo
            - webhookSecret
            type: object
          status:
            description: HeliosAppStatus defines the observed state of HeliosApp
            properties:
              argoApplication:
                description: Tên của ArgoCD Application đã được tạo
                type: string
              conditions:
                description: 'Trạng thái hiện tại của các tài nguyên được quản lý:
                  "DeploymentReady", "ServiceReady"'
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              deployedVersion:
                description: Tag của image đã được deploy thành công
                type: string
              lastChangeTime:
                description: Timestamp của lần thay đổi gần nhất (dùng cho debouncing)
                format: date-time
                type: string
              manifestPipelineRun:
                description: Tên của PipelineRun đang chạy hoặc đã hoàn thành cho
                  manifest generation
                type: string
              observedGeneration:
                description: Generation của HeliosApp đã được quan sát và xử lý
                format: int64
                type: integer
              currentCPU:
                description: CurrentCPU lưu trữ mức tiêu thụ CPU thực tế (được optimize service đo lường)
                type: string
              currentMemory:
                description: CurrentMemory lưu trữ mức tiêu thụ Memory thực tế
                type: string
              phase:
                description: Trạng thái tổng quát của App
                type: string
              message:
                description: Lý do chi tiết cho trạng thái hiện tại
                type: string
              pendingGeneration:
                description: Generation đang chờ xử lý (dùng để debounce nhiều thay
                  đổi liên tiếp)
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
